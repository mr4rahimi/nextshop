services:
  db:
    image: postgres:16
    container_name: mymonta_pg
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mymonta
    ports:
      - "54321:5432"
    volumes:
      - mymonta_pg_data:/var/lib/postgresql/data

volumes:
  mymonta_pg_data:
    external: true
    name: shop_mymonta_pg_data