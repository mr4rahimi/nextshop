services:
  db:
    image: postgres:16
    container_name: mymonta_pg
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mymonta
    ports:
      - "54321:5432"
    volumes:
      - mymonta_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: mymonta_redis
    command: redis-server --appendonly yes --maxmemory-policy noeviction
    ports:
      - "63791:6379"
    volumes:
      - mymonta_redis_data:/data
    restart: unless-stopped

volumes:
  mymonta_pg_data:
    external: true
    name: shop_mymonta_pg_data
  mymonta_redis_data: